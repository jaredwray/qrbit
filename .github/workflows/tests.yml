name: tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-test-winmac:
    name: tests
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        arch: [x64]
        node: [22]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Setup pnpm (version is read from the packageManager field in package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # Setup Node
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Setup Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Run Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test:ci
  build-test-nodejs:
    name: tests
    strategy:
      matrix:
        os: [ubuntu-latest]
        arch: [x64]
        node: [22, 24, 26]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Setup pnpm (version is read from the packageManager field in package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # Setup Node
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Setup Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Run Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test:ci