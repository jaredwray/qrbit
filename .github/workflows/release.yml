name: release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-artifacts:
    name: build-artifacts
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: x64
            target: x86_64-unknown-linux-musl
            container: node:22-alpine
            build_env: alpine
          - os: windows-latest
            arch: x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            arch: x64
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Setup pnpm (version is read from the packageManager field in package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # Setup Node - Skip for Alpine (already in container)
      - name: Use Node.js
        if: matrix.build_env != 'alpine'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Alpine Dependencies
        if: matrix.build_env == 'alpine'
        run: |
          apk add --no-cache \
            python3 \
            make \
            g++ \
            musl-dev \
            clang \
            llvm \
            build-base \
            bash \
            curl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Rust
        run: |
          rustup target add ${{matrix.target}}
          pnpm napi build --platform --release --output-dir src --target ${{ matrix.target }}

      - name: Build
        run: pnpm build:release

      - name: Run Tests
        run: pnpm test:ci

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qa-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.target }}
          path: dist/*.node

  build-release:
    name: build-release
    needs: build-artifacts
    runs-on: ubuntu-latest

    # OIDC Trusted Publishing requires id-token: write so pnpm can mint an
    # OIDC token and generate provenance attestations. No NPM_TOKEN needed.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Setup pnpm (version is read from the packageManager field in package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # Setup Node
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build Typescript Project
        run: pnpm build:release

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show Artifacts
        run: ls -alhR ./artifacts

      - name: Remove Artifacts in Dist
        run: rm -f dist/*.node

      - name: Copy all artifacts that end in .node to dist
        run: |
          find ./artifacts -name "*.node" -exec cp {} dist/ \;

      - name: Show Dist
        run: |
            ls -alh ./dist

      # Publishes via OIDC Trusted Publishing (no token), using the pnpm
      # installed above by pnpm/action-setup. Provenance is generated
      # automatically; --provenance keeps the intent explicit. --no-git-checks
      # is required because pnpm otherwise refuses to publish in CI.
      # Requires a trusted publisher to be configured for this package on
      # npmjs.com pointing at this repo and workflow.
      - name: Publish
        run: pnpm publish --provenance --no-git-checks --ignore-scripts